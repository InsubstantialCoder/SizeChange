name: .NET Build

on:
  push:
    tags-ignore: '*'
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Prepare Environment
        uses: ./.github/actions/prepare-environment
        with:
          project: Shrinkage
      - name: Build and Upload Artifact
        uses: ./.github/actions/build-with-artifact
        with:
          project: Shrinkage
